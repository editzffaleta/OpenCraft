name: OpenCraft
options:
  bundleIdPrefix: ai.opencraft
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    ENABLE_APP_INTENTS_METADATA_GENERATION: NO

packages:
  OpenCraftKit:
    path: ../shared/OpenCraftKit
  Swabble:
    path: ../../Swabble

schemes:
  OpenCraft:
    shared: true
    build:
      targets:
        OpenCraft: all
    test:
      targets:
        - OpenCraftTests
        - OpenCraftLogicTests
  OpenCraftLogicTests:
    shared: true
    build:
      targets:
        OpenCraftLogicTests: all
    test:
      targets:
        - OpenCraftLogicTests

targets:
  OpenCraft:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
    dependencies:
      - target: OpenCraftShareExtension
        embed: true
      - target: OpenCraftActivityWidget
        embed: true
      - target: OpenCraftWatchApp
      - package: OpenCraftKit
      - package: OpenCraftKit
        product: OpenCraftChatUI
      - package: OpenCraftKit
        product: OpenCraftProtocol
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    preBuildScripts:
      - name: SwiftFormat (lint)
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftformat >/dev/null 2>&1; then
            echo "error: swiftformat not found (brew install swiftformat)" >&2
            exit 1
          fi
          swiftformat --lint --config "$SRCROOT/../../.swiftformat" \
            --filelist "$SRCROOT/SwiftSources.input.xcfilelist"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: swiftlint not found (brew install swiftlint)" >&2
            exit 1
          fi
          swiftlint lint --config "$SRCROOT/.swiftlint.yml" --use-script-input-file-lists
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: Sources/OpenCraft.entitlements
        CODE_SIGN_STYLE: "$(OPENCRAFT_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(OPENCRAFT_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(OPENCRAFT_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(OPENCRAFT_APP_PROFILE)"
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
      configs:
        Debug:
          OPENCRAFT_PUSH_TRANSPORT: direct
          OPENCRAFT_PUSH_DISTRIBUTION: local
          OPENCRAFT_PUSH_RELAY_BASE_URL: ""
          OPENCRAFT_PUSH_APNS_ENVIRONMENT: sandbox
        Release:
          OPENCRAFT_PUSH_TRANSPORT: direct
          OPENCRAFT_PUSH_DISTRIBUTION: local
          OPENCRAFT_PUSH_RELAY_BASE_URL: ""
          OPENCRAFT_PUSH_APNS_ENVIRONMENT: production
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: OpenCraft
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: ai.opencraft.ios
            CFBundleURLSchemes:
              - opencraft
        CFBundleShortVersionString: "$(OPENCRAFT_MARKETING_VERSION)"
        CFBundleVersion: "$(OPENCRAFT_BUILD_VERSION)"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        BGTaskSchedulerPermittedIdentifiers:
          - ai.opencraft.ios.bgrefresh
        NSLocalNetworkUsageDescription: OpenCraft discovers and connects to your OpenCraft gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
        NSBonjourServices:
          - _opencraft-gw._tcp
        NSCameraUsageDescription: OpenCraft can capture photos or short video clips when requested via the gateway.
        NSLocationWhenInUseUsageDescription: OpenCraft uses your location when you allow location sharing.
        NSLocationAlwaysAndWhenInUseUsageDescription: OpenCraft can share your location in the background when you enable Always.
        NSMicrophoneUsageDescription: OpenCraft needs microphone access for voice wake.
        NSMotionUsageDescription: OpenCraft may use motion data to support device-aware interactions and automations.
        NSPhotoLibraryUsageDescription: OpenCraft needs photo library access when you choose existing photos to share with your assistant.
        NSSpeechRecognitionUsageDescription: OpenCraft uses on-device speech recognition for voice wake.
        NSSupportsLiveActivities: true
        ITSAppUsesNonExemptEncryption: false
        OpenCraftPushTransport: "$(OPENCRAFT_PUSH_TRANSPORT)"
        OpenCraftPushDistribution: "$(OPENCRAFT_PUSH_DISTRIBUTION)"
        OpenCraftPushRelayBaseURL: "$(OPENCRAFT_PUSH_RELAY_BASE_URL)"
        OpenCraftPushAPNsEnvironment: "$(OPENCRAFT_PUSH_APNS_ENVIRONMENT)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  OpenCraftShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ShareExtension
    dependencies:
      - package: OpenCraftKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(OPENCRAFT_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(OPENCRAFT_DEVELOPMENT_TEAM)"
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(OPENCRAFT_SHARE_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(OPENCRAFT_SHARE_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: OpenCraft Share
        CFBundleShortVersionString: "$(OPENCRAFT_MARKETING_VERSION)"
        CFBundleVersion: "$(OPENCRAFT_BUILD_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1

  OpenCraftActivityWidget:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ActivityWidget
      - path: Sources/LiveActivity/OpenCraftActivityAttributes.swift
    dependencies:
      - sdk: WidgetKit.framework
      - sdk: ActivityKit.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(OPENCRAFT_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(OPENCRAFT_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(OPENCRAFT_ACTIVITY_WIDGET_BUNDLE_ID)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        SUPPORTS_LIVE_ACTIVITIES: YES
    info:
      path: ActivityWidget/Info.plist
      properties:
        CFBundleDisplayName: OpenCraft Activity
        CFBundleShortVersionString: "$(OPENCRAFT_MARKETING_VERSION)"
        CFBundleVersion: "$(OPENCRAFT_BUILD_VERSION)"
        NSSupportsLiveActivities: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  OpenCraftWatchApp:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
    dependencies:
      - target: OpenCraftWatchExtension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APPINTENTS_METADATA: NO
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        PRODUCT_BUNDLE_IDENTIFIER: "$(OPENCRAFT_WATCH_APP_BUNDLE_ID)"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: OpenCraft
        CFBundleShortVersionString: "$(OPENCRAFT_MARKETING_VERSION)"
        CFBundleVersion: "$(OPENCRAFT_BUILD_VERSION)"
        WKCompanionAppBundleIdentifier: "$(OPENCRAFT_APP_BUNDLE_ID)"
        WKWatchKitApp: true

  OpenCraftWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchExtension/Sources
    dependencies:
      - sdk: AppIntents.framework
      - sdk: WatchConnectivity.framework
      - sdk: UserNotifications.framework
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "$(OPENCRAFT_WATCH_EXTENSION_BUNDLE_ID)"
    info:
      path: WatchExtension/Info.plist
      properties:
        CFBundleDisplayName: OpenCraft
        CFBundleShortVersionString: "$(OPENCRAFT_MARKETING_VERSION)"
        CFBundleVersion: "$(OPENCRAFT_BUILD_VERSION)"
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: "$(OPENCRAFT_WATCH_APP_BUNDLE_ID)"
          NSExtensionPointIdentifier: com.apple.watchkit

  OpenCraftTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests
        excludes:
          - Logic
    dependencies:
      - target: OpenCraft
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(OPENCRAFT_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(OPENCRAFT_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.opencraft.ios.tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/OpenCraft.app/OpenCraft"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: OpenCraftTests
        CFBundleShortVersionString: "$(OPENCRAFT_MARKETING_VERSION)"
        CFBundleVersion: "$(OPENCRAFT_BUILD_VERSION)"

  OpenCraftLogicTests:
    type: bundle.unit-test
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Tests/Logic
    dependencies:
      - package: OpenCraftKit
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(OPENCRAFT_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(OPENCRAFT_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: ai.opencraft.ios.logic-tests
        ENABLE_APP_INTENTS_METADATA_GENERATION: NO
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: OpenCraftLogicTests
        CFBundleShortVersionString: "$(OPENCRAFT_MARKETING_VERSION)"
        CFBundleVersion: "$(OPENCRAFT_BUILD_VERSION)"
